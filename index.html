<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indurama | v4.0</title>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.9);
            --apple-text: #1d1d1f;
            --apple-blue: #0071e3;
            --apple-blue-soft: #e1f0ff;
            --apple-gray: #86868b;
            --apple-green: #34c759;
            --apple-green-soft: #e8f5e9;
            --apple-red: #ff3b30;
            --apple-yellow: #fff9c4;
            --apple-yellow-text: #856404;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background-color: var(--apple-bg); color: var(--apple-text); margin: 0; padding: 15px; display: flex; justify-content: center; -webkit-font-smoothing: antialiased; }
        .wrapper { max-width: 550px; width: 100%; animation: fadeIn 0.5s ease-out; }

        .glass-card { background: var(--apple-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 28px; padding: 40px 30px; box-shadow: 0 12px 45px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.4); margin-bottom: 25px; }
        
        .main-title { text-align: center; font-size: 24px; font-weight: 800; color: #003366; margin-bottom: 10px; }
        .sub-title { text-align: center; color: var(--apple-gray); font-size: 15px; margin-bottom: 35px; }

        select, input, textarea { width: 100%; padding: 18px; border-radius: 16px; border: 1px solid #d2d2d7; font-size: 18px; outline: none; margin: 10px 0; }
        
        .btn { border: none; padding: 18px; border-radius: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 16px; width: 100%; text-align: center; margin-top: 10px; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--apple-blue); color: white; }
        .btn-outline { background: #fff; color: var(--apple-blue); border: 2px solid var(--apple-blue); }
        .btn-confirm { background: var(--apple-green) !important; color: white !important; }
        .btn-danger-confirm { background: var(--apple-red) !important; color: white !important; }

        .step-item { background: white; border-radius: 24px; padding: 25px; margin-bottom: 18px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .step-item.active { background-color: var(--apple-blue-soft); border: 2px solid var(--apple-blue); }
        .step-item.completed { background-color: var(--apple-green-soft); border: 1px solid var(--apple-green); }

        .progress-container { background: #e5e5ea; height: 10px; border-radius: 10px; flex: 1; }
        .progress-bar { background: var(--apple-blue); height: 100%; border-radius: 10px; transition: width 0.5s; }
        
        .timestamp { font-size: 11px; color: #555; font-weight: 600; display: block; margin-top: 4px; }
        
        #turn-alert { display: none; padding: 18px; border-radius: 16px; text-align: center; font-size: 15px; font-weight: 800; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .alert-mine { background: var(--apple-green); color: white; }
        .alert-others { background: var(--apple-yellow); color: var(--apple-yellow-text); border: 1px solid #fbc02d; }

        .timer-display { font-size: 14px; font-weight: 700; color: #555; white-space: nowrap; margin-left: 10px; }
        .completed-text { font-size: 12px; font-weight: 800; color: var(--apple-green); }
        .process-text { font-size: 12px; font-weight: 800; color: var(--apple-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/1006/1006-preview.mp3" preload="auto"></audio>

<div class="wrapper">
    <div id="login-screen" class="glass-card">
        <div class="main-title">CONTROL DE SECUENCIAS CAMBIO SUMINISTRO DE ENERGIA INDURAMA</div>
        <div class="sub-title">Control de procesos V1.0</div>
        <select id="user-select" onchange="checkUserSelection()">
            <option value="" disabled selected>Seleccione usuario...</option>
            <option value="ADMINISTRADOR">⚙️ ADMINISTRADOR</option>
            <option value="MANTENIMIENTO">🛠️ MANTENIMIENTO</option>
            <optgroup label="Operaciones" id="opt-responsables"></optgroup>
        </select>
        <div id="pin-container" style="display:none;">
            <input type="password" id="user-pin" style="text-align:center; letter-spacing:8px;" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="ingresar()">INGRESAR</button>
    </div>

    <div id="app-screen" style="display:none;">
        <div id="turn-alert"></div>

        <div class="glass-card" style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <div><small>USUARIO:</small><br><b id="display-user" style="color:var(--apple-blue)"></b></div>
            <button class="btn btn-outline" style="width:auto; padding:10px 15px;" onclick="location.reload()">SALIR</button>
        </div>
        
        <div style="display: flex; align-items: center; gap: 5px; margin: 20px 0;">
            <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
            <b id="progress-text" style="font-size: 16px; color: var(--apple-blue); min-width: 45px;">0%</b>
            <div class="timer-display">TIEMPO TOTAL: <span id="cronometro">00:00</span></div>
        </div>

        <div id="steps-container"></div>
        <button id="btn-reset-prog" class="btn" style="color:var(--apple-red); border:1px solid var(--apple-red); background:none; display:none;" onclick="confirmarRestablecer()">RESTABLECER SECUENCIA COMPLETA</button>
    </div>

    <div id="admin-screen" style="display:none;">
        <div class="glass-card">
            <h3>Configuración General</h3>
            <label style="font-size: 13px; color: var(--apple-gray);">Duración alerta sonido (segundos):</label>
            <input type="number" id="admin-sound-dur" min="1" max="10" value="1">
            <label style="font-size: 13px; color: var(--apple-gray); margin-top: 10px; display: block;">Responsables (separados por coma):</label>
            <input type="text" id="admin-users" placeholder="Juan, Pedro, Maria">
            <label style="font-size: 13px; color: var(--apple-gray); margin-top: 10px; display: block;">Número total de pasos:</label>
            <input type="number" id="admin-step-count" placeholder="Num. Pasos" onchange="generarFormularioPasos()">
            <div id="steps-setup-container"></div>
            <button id="btn-save-config" class="btn btn-primary" onclick="confirmarGuardadoAdmin()">GUARDAR CONFIGURACIÓN</button>
            <button class="btn btn-outline" onclick="location.reload()">VOLVER</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAwxl8S6K5rJZqTzE6hcik5cJK42Ppp2_I",
        authDomain: "induramasecuenciaencendido.firebaseapp.com",
        projectId: "induramasecuenciaencendido",
        storageBucket: "induramasecuenciaencendido.firebasestorage.app",
        messagingSenderId: "360580174899",
        appId: "1:360580174899:web:5b867158a51e84cc3aff46"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const configRef = doc(db, "configuracion", "estructura");
    const securityRef = doc(db, "configuracion", "seguridad");
    const prodRef = doc(db, "produccion", "estado_actual");

    let miUsuario = "", configGlobal = null, prodGlobal = null, pinsSeguridad = {};
    let confirmandoId = null, timerConfirm = null, panelAbiertoIdx = -1;
    let ultimoPasoNotificado = -1;
    let intervalCronometro = null;

    async function init() {
        const snap = await getDoc(securityRef);
        if(snap.exists()) pinsSeguridad = snap.data();
    }
    init();

    onSnapshot(configRef, (snap) => {
        if(snap.exists()){
            configGlobal = snap.data();
            const group = document.getElementById('opt-responsables');
            group.innerHTML = "";
            configGlobal.responsables.forEach(r => {
                if(r !== "MANTENIMIENTO" && r !== "ADMINISTRADOR"){
                    const opt = document.createElement('option'); opt.value = r; opt.innerText = r; group.appendChild(opt);
                }
            });
            if(miUsuario) renderApp();
        }
    });

    onSnapshot(prodRef, (snap) => {
        if(snap.exists()) {
            const data = snap.data();
            if(miUsuario && data.pasoActivo !== ultimoPasoNotificado) {
                const respActual = configGlobal?.pasos[data.pasoActivo]?.responsable;
                if(respActual === miUsuario) {
                    const audio = document.getElementById('alert-sound');
                    const dur = (configGlobal.duracionSonido || 1) * 1000;
                    audio.play().catch(e => console.log("Audio bloqueado"));
                    setTimeout(() => { audio.pause(); audio.currentTime = 0; }, dur);
                }
                ultimoPasoNotificado = data.pasoActivo;
            }
            prodGlobal = data;
            actualizarLogicaCronometro();
        }
        if(miUsuario) renderApp();
    });

    function actualizarLogicaCronometro() {
        if (intervalCronometro) clearInterval(intervalCronometro);
        const display = document.getElementById('cronometro');
        if (!prodGlobal || !prodGlobal.startTime) {
            display.innerText = "00:00";
            return;
        }
        const tick = () => {
            let ahora = Date.now();
            let inicio = typeof prodGlobal.startTime === 'object' ? prodGlobal.startTime.seconds * 1000 : prodGlobal.startTime;
            if (prodGlobal.endTime) {
                ahora = typeof prodGlobal.endTime === 'object' ? prodGlobal.endTime.seconds * 1000 : prodGlobal.endTime;
                clearInterval(intervalCronometro);
            }
            let diff = Math.floor((ahora - inicio) / 1000);
            if (diff < 0) diff = 0;
            const mins = Math.floor(diff / 60).toString().padStart(2, '0');
            const secs = (diff % 60).toString().padStart(2, '0');
            display.innerText = `${mins}:${secs}`;
        };
        tick();
        if (!prodGlobal.endTime) intervalCronometro = setInterval(tick, 1000);
    }

    window.checkUserSelection = () => {
        const user = document.getElementById('user-select').value;
        document.getElementById('pin-container').style.display = (user === "ADMINISTRADOR" || user === "MANTENIMIENTO") ? 'block' : 'none';
    };

    window.ingresar = async () => {
        miUsuario = document.getElementById('user-select').value;
        const pin = document.getElementById('user-pin').value;
        if(!miUsuario) return;
        if(pinsSeguridad[miUsuario] && pin !== pinsSeguridad[miUsuario]) return alert("PIN Incorrecto");
        if(miUsuario === "ADMINISTRADOR") {
            cargarDatosAdmin();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'block';
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('display-user').innerText = miUsuario;
            if(miUsuario === "MANTENIMIENTO") document.getElementById('btn-reset-prog').style.display = 'block';
            renderApp();
        }
    };

    function renderApp() {
        const container = document.getElementById('steps-container');
        const alertBox = document.getElementById('turn-alert');
        if(!configGlobal || !prodGlobal) return;
        
        container.innerHTML = "";
        const pasoActual = Number(prodGlobal.pasoActivo) || 0;
        
        const pct = configGlobal.pasos.length > 0 ? Math.round((pasoActual / configGlobal.pasos.length) * 100) : 0;
        document.getElementById('progress-bar').style.width = pct + "%";
        document.getElementById('progress-text').innerText = pct + "%";

        const respPasoActual = configGlobal.pasos[pasoActual]?.responsable;
        if (respPasoActual) {
            alertBox.style.display = 'block';
            if (respPasoActual === miUsuario) {
                alertBox.className = 'alert-mine';
                alertBox.innerText = '✅ ¡SU PROCESO ESTÁ EN MARCHA! ✅';
            } else {
                alertBox.className = 'alert-others';
                alertBox.innerText = `PROCESO EN MARCHA DE "${respPasoActual.toUpperCase()}"`;
            }
        } else {
            alertBox.style.display = 'none';
        }

        configGlobal.pasos.forEach((datos, i) => {
            const completado = i < pasoActual;
            const activo = i === pasoActual;
            const soyMante = (miUsuario === "MANTENIMIENTO");
            const puedeActuar = activo && (datos.responsable === miUsuario || soyMante);
            const panelAbierto = panelAbiertoIdx === i;
            const doneActs = prodGlobal.actividadesCompletadas?.[i] || [];
            const timeFin = prodGlobal.timestampsPasos?.[i] || "";
            const duracionPaso = prodGlobal.duracionesPasos?.[i] || "";

            const item = document.createElement('div');
            item.className = `step-item ${completado ? 'completed' : (activo ? 'active' : '')}`;
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <small>PASO ${i+1}</small>
                        <h3 style="margin:5px 0;">${datos.responsable}</h3>
                        ${completado && timeFin ? `<span class="timestamp">Finalizado: ${timeFin} | TIEMPO DEL PROCESO: ${duracionPaso}</span>` : ''}
                    </div>
                    ${completado ? '<span class="completed-text">COMPLETADO</span>' : (activo ? '<span class="process-text">EN PROCESO</span>' : '')}
                </div>
                <div style="display:flex; gap:10px; margin-top:15px">
                    <button class="btn btn-outline" style="padding:10px; font-size:13px" onclick="toggleActs(${i})">ACTIVIDADES (${doneActs.length}/${datos.actividades.length})</button>
                    ${puedeActuar && doneActs.length === datos.actividades.length ? 
                    `<button id="conf-p-${i}" class="btn btn-primary ${confirmandoId==='conf-p-'+i?'btn-confirm':''}" style="padding:10px; font-size:13px" onclick="procesarAccion('paso', ${i}, null, 'conf-p-${i}')">
                        ${confirmandoId==='conf-p-'+i?'CONFIRMAR':'FINALIZAR PASO'}
                    </button>` : ''}
                </div>
                <div id="acts-${i}" style="display:${panelAbierto?'block':'none'}; margin-top:15px; border-top:1px solid rgba(0,0,0,0.1); padding-top:10px">
                    ${datos.actividades.map((a, ai) => {
                        const hecha = doneActs.includes(ai);
                        const idC = `c-a-${i}-${ai}`;
                        const tAct = prodGlobal.timestampsActividades?.[`${i}-${ai}`] || "";
                        return `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f0f0f0">
                            <div><span style="font-size:14px; ${hecha?'text-decoration:line-through; color:gray':''}">${a}</span>${hecha && tAct ? `<span class="timestamp">${tAct}</span>`:''}</div>
                            ${hecha ? '<span class="completed-text">COMPLETADO</span>' : (puedeActuar ? `<button class="btn btn-outline ${confirmandoId===idC?'btn-confirm':''}" style="width:auto; padding:5px 12px; font-size:11px" onclick="procesarAccion('act', ${i}, ${ai}, '${idC}')">${confirmandoId===idC?'CONFIRMAR':'LISTO'}</button>` : '')}
                        </div>`;
                    }).join('')}
                </div>`;
            container.appendChild(item);
        });
    }

    window.toggleActs = (i) => { panelAbiertoIdx = (panelAbiertoIdx === i) ? -1 : i; renderApp(); };

    window.procesarAccion = async (tipo, pasoIdx, actIdx, idU) => {
        if(confirmandoId !== idU) {
            confirmandoId = idU; renderApp();
            if(timerConfirm) clearTimeout(timerConfirm);
            timerConfirm = setTimeout(() => { confirmandoId = null; renderApp(); }, 3000);
        } else {
            const pNum = Number(pasoIdx);
            const ahoraMs = Date.now();
            const ahoraStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            let updateData = {};
            
            if (!prodGlobal.startTime && miUsuario === "MANTENIMIENTO") updateData.startTime = ahoraMs;

            if(tipo === 'paso') {
                const ts = { ...(prodGlobal.timestampsPasos || {}) }; 
                const rawTs = { ...(prodGlobal.rawTimestampsPasos || {}) };
                const durPasos = { ...(prodGlobal.duracionesPasos || {}) };
                
                ts[pNum] = ahoraStr;
                rawTs[pNum] = ahoraMs;

                let inicioRef = (pNum === 0) ? (updateData.startTime || prodGlobal.startTime) : (prodGlobal.rawTimestampsPasos ? prodGlobal.rawTimestampsPasos[pNum-1] : null);
                
                if (inicioRef) {
                    let inicioVal = typeof inicioRef === 'object' ? inicioRef.seconds * 1000 : inicioRef;
                    let diff = Math.floor((ahoraMs - inicioVal) / 1000);
                    const mins = Math.floor(diff / 60).toString().padStart(2, '0');
                    const secs = (diff % 60).toString().padStart(2, '0');
                    durPasos[pNum] = `${mins}:${secs}`;
                } else {
                    durPasos[pNum] = "00:00";
                }

                panelAbiertoIdx = -1;
                confirmandoId = null;
                updateData.pasoActivo = pNum + 1;
                updateData.timestampsPasos = ts;
                updateData.rawTimestampsPasos = rawTs;
                updateData.duracionesPasos = durPasos;

                if (pNum + 1 === configGlobal.pasos.length) updateData.endTime = ahoraMs;
            } else {
                // LOGICA DE ACTIVIDADES CON FINALIZACION AUTOMATICA
                const ac = { ...(prodGlobal.actividadesCompletadas || {}) }; 
                if(!ac[pNum]) ac[pNum] = [];
                const tsA = { ...(prodGlobal.timestampsActividades || {}) };
                if(!ac[pNum].includes(actIdx)) {
                    ac[pNum].push(actIdx);
                    tsA[`${pNum}-${actIdx}`] = ahoraStr;
                }
                confirmandoId = null;
                updateData.actividadesCompletadas = ac;
                updateData.timestampsActividades = tsA;

                // Verificación de fin de paso automático
                const totalActs = configGlobal.pasos[pNum].actividades.length;
                if(ac[pNum].length === totalActs) {
                    const ts = { ...(prodGlobal.timestampsPasos || {}) }; 
                    const rawTs = { ...(prodGlobal.rawTimestampsPasos || {}) };
                    const durPasos = { ...(prodGlobal.duracionesPasos || {}) };
                    
                    ts[pNum] = ahoraStr;
                    rawTs[pNum] = ahoraMs;

                    let inicioRef = (pNum === 0) ? (updateData.startTime || prodGlobal.startTime) : (prodGlobal.rawTimestampsPasos ? prodGlobal.rawTimestampsPasos[pNum-1] : null);
                    
                    if (inicioRef) {
                        let inicioVal = typeof inicioRef === 'object' ? inicioRef.seconds * 1000 : inicioRef;
                        let diff = Math.floor((ahoraMs - inicioVal) / 1000);
                        const mins = Math.floor(diff / 60).toString().padStart(2, '0');
                        const secs = (diff % 60).toString().padStart(2, '0');
                        durPasos[pNum] = `${mins}:${secs}`;
                    } else {
                        durPasos[pNum] = "00:00";
                    }

                    updateData.pasoActivo = pNum + 1;
                    updateData.timestampsPasos = ts;
                    updateData.rawTimestampsPasos = rawTs;
                    updateData.duracionesPasos = durPasos;
                    panelAbiertoIdx = -1; // Cerrar panel automáticamente

                    if (pNum + 1 === configGlobal.pasos.length) updateData.endTime = ahoraMs;
                }
            }
            await updateDoc(prodRef, updateData);
            if(timerConfirm) clearTimeout(timerConfirm);
            renderApp();
        }
    };

    window.confirmarRestablecer = async () => {
        if(confirmandoId !== "btn-reset") {
            confirmandoId = "btn-reset"; 
            const btn = document.getElementById("btn-reset-prog");
            btn.innerText = "CONFIRMAR RESTABLECIMIENTO";
            btn.classList.add("btn-danger-confirm");
            if(timerConfirm) clearTimeout(timerConfirm);
            timerConfirm = setTimeout(() => { 
                confirmandoId = null; 
                btn.innerText = "RESTABLECER SECUENCIA COMPLETA";
                btn.classList.remove("btn-danger-confirm");
                renderApp(); 
            }, 3000);
        } else {
            clearTimeout(timerConfirm); confirmandoId = null;
            await setDoc(prodRef, { 
                pasoActivo: 0, 
                actividadesCompletadas: {}, 
                timestampsActividades: {}, 
                timestampsPasos: {}, 
                rawTimestampsPasos: {},
                duracionesPasos: {},
                ultimoSonido: -1, 
                startTime: null, 
                endTime: null 
            });
            location.reload();
        }
    };

    window.confirmarGuardadoAdmin = async () => {
        const btn = document.getElementById("btn-save-config");
        if(confirmandoId !== "admin-save") {
            confirmandoId = "admin-save"; btn.innerText = "¿CONFIRMAR CAMBIOS?"; btn.classList.add("btn-confirm");
            if(timerConfirm) clearTimeout(timerConfirm);
            timerConfirm = setTimeout(() => { confirmandoId = null; btn.innerText = "GUARDAR CONFIGURACIÓN"; btn.classList.remove("btn-confirm"); }, 3000);
        } else {
            clearTimeout(timerConfirm); confirmandoId = null;
            const count = document.getElementById('admin-step-count').value;
            const resps = document.getElementById('admin-users').value.split(',').map(s => s.trim());
            const durSonido = parseInt(document.getElementById('admin-sound-dur').value) || 1;
            const pasos = [];
            for(let i=0; i<count; i++){
                pasos.push({ 
                    responsable: document.getElementById(`resp-${i}`).value, 
                    actividades: document.getElementById(`acts-${i}`).value.split('\n').filter(a => a.trim()!=='') 
                });
            }
            await setDoc(configRef, { responsables: resps, pasos, duracionSonido: durSonido });
            location.reload();
        }
    };

    window.generarFormularioPasos = (existente = false) => {
        const count = document.getElementById('admin-step-count').value;
        const container = document.getElementById('steps-setup-container');
        const resps = document.getElementById('admin-users').value.split(',').map(s => s.trim());
        container.innerHTML = "";
        for(let i=0; i<count; i++){
            const rPrev = (existente && configGlobal.pasos[i]) ? configGlobal.pasos[i].responsable : resps[0];
            const aPrev = (existente && configGlobal.pasos[i]) ? configGlobal.pasos[i].actividades.join('\n') : "";
            container.innerHTML += `<div style="background:#eee; padding:10px; border-radius:10px; margin-top:10px"><b>Paso ${i+1}</b><select id="resp-${i}">${resps.map(r=>`<option value="${r}" ${r===rPrev?'selected':''}>${r}</option>`).join('')}</select><textarea id="acts-${i}" placeholder="Acts">${aPrev}</textarea></div>`;
        }
    };

    function cargarDatosAdmin() {
        if(!configGlobal) return;
        document.getElementById('admin-users').value = configGlobal.responsables.join(', ');
        document.getElementById('admin-step-count').value = configGlobal.pasos.length;
        document.getElementById('admin-sound-dur').value = configGlobal.duracionSonido || 1;
        generarFormularioPasos(true);
    }
</script>
</body>
</html>
